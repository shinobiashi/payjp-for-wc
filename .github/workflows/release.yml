name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies & build
        run: |
          npm ci
          npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Extract lines between "= VERSION =" and the next "= X.Y.Z =" heading
          BODY=$(awk "/^= ${VERSION} =/{found=1; next} found && /^= [0-9]+\.[0-9]+/{exit} found && NF{print}" readme.txt)
          # Write to GITHUB_OUTPUT as multiline value
          {
            echo "BODY<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create plugin zip
        run: |
          PLUGIN_SLUG="payjp-for-wc"
          VERSION="${{ steps.version.outputs.VERSION }}"
          DEST="${PLUGIN_SLUG}-${VERSION}"

          # Copy release files to staging directory
          mkdir -p "/tmp/${DEST}/${PLUGIN_SLUG}"
          rsync -a \
            --exclude-from='.distignore' \
            . "/tmp/${DEST}/${PLUGIN_SLUG}/"

          # Create zip
          cd "/tmp/${DEST}"
          zip -r "${PLUGIN_SLUG}-${VERSION}.zip" "${PLUGIN_SLUG}/"

          # Move to workspace
          mv "${PLUGIN_SLUG}-${VERSION}.zip" "$GITHUB_WORKSPACE/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.BODY }}
          generate_release_notes: true
          files: payjp-for-wc-${{ steps.version.outputs.VERSION }}.zip
